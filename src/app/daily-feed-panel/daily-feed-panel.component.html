<div class="card-title-wrapper">
    <span class="quicksand-font"> Registro diário </span>
    <div class="actions-wrapper">
        <div class="card-action" matRipple>
            <span class="quicksand-font"> Detalhes </span>
        </div>
    </div>
</div>

<div class="card-std">
    <div class="content-wrapper">
        <table mat-table [dataSource]="records" class="mat-elevation-z8">
            <ng-container matColumnDef="dateTime">
                <th mat-header-cell *matHeaderCellDef> Horário </th>
                <td mat-cell *matCellDef="let element"> {{element.dateTime | date:'HH:mm'}} </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </div>
</div>
